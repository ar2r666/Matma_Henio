<!DOCTYPE html>
<html lang="pl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kaźmierz Kalkulus - Przygody z Tabliczką Mnożenia</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main>
      <section class="scoreboard" aria-label="Pasek postępów">
        <div class="score">
          <span class="label">Wynik:</span>
          <span id="scoreValue" class="value">0</span>
        </div>
        <div class="progress">
          <span class="label">Postęp:</span>
          <div class="progress-bar" role="progressbar" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0">
            <div id="progressFill"></div>
          </div>
        </div>
      </section>

      <nav class="level-tabs" aria-label="Wybór poziomu">
        <button class="tab active" data-target="level1">Poziom 1</button>
        <button class="tab" data-target="level2" disabled>Poziom 2</button>
        <button class="tab" data-target="gameLevel" disabled>Gra</button>
      </nav>

      <section class="level-panels" aria-live="polite">
        <article class="level-panel active" id="level1" data-level="level1">
          <h2>Poziom 1 – Pierwsze kroki</h2>
          <p>Rozgrzewka z wynikami do 30.</p>
          <div class="task-grid" id="level1Tasks"></div>
          <div class="completion-area" aria-live="polite"></div>
        </article>

        <article class="level-panel" id="level2" data-level="level2">
          <h2>Poziom 2 – Wspinaczka</h2>
          <p>Ćwiczymy działania z wynikami do 70.</p>
          <div class="task-grid" id="level2Tasks"></div>
          <div class="completion-area" aria-live="polite"></div>
        </article>

        <article class="level-panel" id="gameLevel" data-level="game">
          <div class="game-wrapper">
            <div class="game-area" id="gameArea">
              <span
                class="game-action"
                id="gameAction"
                role="status"
                aria-live="polite"
                >Gotowy?</span
              >
              <span class="game-score" aria-label="Aktualny wynik">
                Punkty: <span id="gameScore">0</span> / 10
              </span>
              <div class="catcher" id="catcher" aria-hidden="true"></div>
            </div>
            <div class="game-controls">Sterowanie: ← i →</div>
            <div class="game-summary" id="gameSummary" aria-live="polite"></div>
          </div>
        </article>
      </section>
    </main>

    <script src="app.js" defer></script>
  </body>
</html>
