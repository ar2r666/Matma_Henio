// Prototyp projektu strony do ćwiczenia matematyki dla uczniów 5 klasy

// Frontend (HTML, CSS, JavaScript)
const htmlContent = `
<div>
    <h1>Matematyka - Przygotowanie do Sprawdzianu</h1>
    <input id="topic" type="text" placeholder="Wpisz zagadnienie, np. ułamki">
    <button onclick="generateTasks()">Generuj Zadania</button>
    <div id="tasks"></div>
</div>

<script>
    async function generateTasks() {
        const topic = document.getElementById('topic').value;
        const apiKey = 'YOUR_OPENAI_API_KEY'; // Tutaj wstaw swój klucz API

        try {
            const response = await fetch('https://api.openai.com/v1/completions', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${apiKey}`
                },
                body: JSON.stringify({
                    model: 'text-davinci-003',
                    prompt: `Stwórz 10 zadań matematycznych dla ucznia 5 klasy z tematu: ${topic}`,
                    max_tokens: 150
                })
            });

            const data = await response.json();
            const tasks = data.choices[0].text.split('\n').filter(task => task);
            let tasksHtml = '';
            tasks.forEach((task, index) => {
                tasksHtml += `<p>Zadanie ${index + 1}: ${task}</p><input type="text" id="answer${index}"><br>`;
            });
            document.getElementById('tasks').innerHTML = tasksHtml;
        } catch (error) {
            console.error('Błąd przy generowaniu zadań', error);
            alert('Wystąpił problem z generowaniem zadań.');
        }
    }
</script>
`;
